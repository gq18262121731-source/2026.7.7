# Common training defaults for the rice disease YOLO branch.
# All values are suggested placeholders and must be confirmed before real training.

status: "待真实训练确认"
task: detect
model_family: yolo
class_count: 5
seed: 2026
device: auto
workers: 4
cache: false
output_root: ai_model_training/experiments

training:
  epochs: 100  # 待真实训练确认
  batch_size: 8  # 待真实训练确认
  learning_rate: 0.001  # 待真实训练确认
  optimizer: auto
  pretrained_weight: yolov8n.pt  # 待真实训练确认
  early_stopping:
    enabled: true
    patience: 20  # 待真实训练确认

augmentation:
  enabled: true
  hsv: cautious
  mosaic: true
  mixup: false
  flip: true
  scale: true
  translate: true
  blur: light
  noise: light

boundaries:
  no_real_training_in_second_round: true
  no_external_download: true
  no_fake_metrics: true
  normal_is_not_detection_class: true
  severity_is_postprocess_field: true
